<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jake Kiniry | Links</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            box-sizing: border-box;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 3px solid var(--card-bg);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 2.5rem 0 1rem 0;
            text-align: left;
            color: var(--text-main);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .link-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            color: var(--accent-color);
        }

        .link-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* Contact Form Styles */
        .contact-form {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: var(--text-main);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #f9fafb;
            transition: border-color 0.2s, outline 0.2s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--accent-color);
            outline: 2px solid rgba(37, 99, 235, 0.2);
            background-color: #fff;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace the placeholder image URL below with your own profile photo link -->
        <img src="https://placeholder.com" alt="Jake Kiniry" class="profile-img">
        
        <h1>Jake Kiniry</h1>
        <p>Student</p>

        <ul class="links-list">
            <li>
                <a href="https://github.com" class="link-item" target="_blank" rel="noopener noreferrer">
                    <svg class="link-icon" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                    GitHub
                </a>
            </li>
            <li>
                <a href="https://linkedin.com" class="link-item" target="_blank" rel="noopener noreferrer">
                    <svg class="link-icon" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.73C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    LinkedIn
                </a>
            </li>
        </ul>

        <h2>Send a Message</h2>

        <!-- Using native HTML POST structure with zero JavaScript hooks -->
        <form action="https://formspree.io" method="POST" class="contact-form">
            <!-- Passes custom routing variables to force Formspree to execute securely -->
            <input type="hidden" name="_next" value="https://jakekiniry.com">
            
            <div class="form-group">
                <label for="email-input">Your Email Address</label>
                <input type="email" name="email" id="email-input" required placeholder="name@example.com">
            </div>
            
            <div class="form-group">
                <label for="message-input">Message</label>
                <textarea name="message" id="message-input" rows="4" required placeholder="How can I help you?"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <footer>
            <p>&copy; 2026 Jake Kiniry</p>
        </footer>
    </div>

</body>
</html>
